
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Stop Inventory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Quick Stop Food & Liquor - Available Inventory</h1>
    <p>Inventory updated daily. If it's not listed here, it's not in stock.</p>
  </header>
  <section id="controls">
    <input type="text" id="search" placeholder="Search products...">
    <select id="categoryFilter">
      <option value="">All Categories</option>
    </select>
  </section>
  <section>
    <div id="productGrid" class="grid"></div>
    <p class="note">Prices and availability are subject to change. Call store to confirm availability.</p>
  </section>
  <script src="script.js"></script>
</body>
</html>
