
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Stop Inventory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top bar with location, phone and hours -->
  <div class="top-bar">
    <div class="top-bar-inner">
      <span class="store-location">📍 111th St, Chicago</span>
      <span class="store-hours">🕒 Mon–Sun: 10 AM – 11 PM</span>
      <span class="store-phone">📞 (773) 555‑1234</span>
    </div>
  </div>
  <header>
    <div class="header-inner">
      <img src="logo.png" alt="Quick Stop Food & Liquor logo" id="logo">
      <div class="title-area">
        <h1>Quick Stop Food & Liquor</h1>
        <p class="tagline">Chicago’s Best Prices on Spirits</p>
        <p class="note">Inventory updated daily. If it's not listed here, it's not in stock.</p>
      </div>
    </div>
  </header>
  <!-- Controls section: search bar and category filter -->
  <section id="controls">
    <input type="text" id="search" placeholder="Search products…" autocomplete="off">
    <select id="categorySelect">
      <option value="all">All Departments</option>
    </select>
  </section>
  <!-- Featured products section (premium items) -->
  <section id="featured">
    <h2>Featured</h2>
    <div id="grid-featured" class="grid"></div>
  </section>
  <!-- Departments container will be populated dynamically -->
  <section id="departments">
    <!-- Department sections inserted here by JavaScript -->
  </section>
  <footer>
    <p class="note">Prices and availability are subject to change. Call store to confirm availability.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
